# Retry failed market-intelligence webhooks every 15 minutes. Secrets: CRON_SECRET, API_URL.

name: Cron webhook retry

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-retry:
    runs-on: ubuntu-latest
    steps:
      - name: Run mi-webhook-retry
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$API_URL" ]; then
            echo "Skip: CRON_SECRET or API_URL not configured."
            exit 0
          fi
          curl -sfS -X POST \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            "${API_URL}/internal/cron/mi-webhook-retry"
