<div style="font-family:Arial,sans-serif;background:#f3f4f6;padding:24px;">

    </div>
    <div style="padding:16px 24px;background:#fafafa;color:#6b7280;font-size:12px;">robertofeijon@gmail.com · Windhoek, Namibia</div>
